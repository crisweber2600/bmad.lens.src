# =============================================================================
# Build full BMAD release with lens-work custom module → lens.core
# GitHub Copilot assets are embedded in lens.coreced by preflight.
# Pipeline:
#   1. Validate lens-work source
#   2. Install full BMAD framework (core + all modules + all IDEs)
#   3. Overlay lens-work custom module into the install
#   4. Run lens-work _module-installer to generate its IDE adapters
#   5. Post-process: rename .xml→.yaml (no-op for v6.2.0+), config.yaml→bmadconfig.yaml
#   6. Fix copilot-instructions.md with correct project config
#   7. Push full payload to lens.coreeta
# =============================================================================

name: Promote to Release

concurrency:
  group: promote-to-release
  cancel-in-progress: false

on:
  push:
    branches: [master]
    paths:
      - "_bmad/lens-work/**"
      - ".github/workflows/promote-to-release.yml"
  workflow_dispatch: # Allow manual trigger

jobs:
  promote-release:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source repo ──────────────────────────────────────
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Read module version ───────────────────────────────────────
      - name: Read module version
        id: version
        run: |
          VERSION=$(grep '^version:' _bmad/lens-work/module.yaml \
            | sed 's/version: *"\?\([^"]*\)"\?/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Module version: $VERSION"

      # ── 3. Validate lens-work source ─────────────────────────────────
      - name: Validate declarative-only constraint
        run: |
          echo "Scanning for disallowed executable files..."

          # _module-installer/ is the official BMAD installer pattern — exempt
          # scripts/ is the BMad Builder standard location for skill Python scripts — exempt
          EXECUTABLES=$(find _bmad/lens-work/ -type f \( \
            -name "*.js" -o -name "*.py" -o -name "*.ts" -o \
            -name "*.rb" -o -name "*.go" -o -name "*.rs" -o \
            -name "*.java" -o -name "*.exe" -o -name "*.bat" -o \
            -name "*.cmd" \
          \) -not -path "*/_module-installer/*" \
             -not -path "*/scripts/*" \
          2>/dev/null || true)

          ROGUE_SCRIPTS=$(find _bmad/lens-work/ -type f \( \
            -name "*.sh" -o -name "*.ps1" \
          \) -not -path "*/scripts/*" 2>/dev/null || true)

          if [ -n "$EXECUTABLES" ] || [ -n "$ROGUE_SCRIPTS" ]; then
            echo "::error::Disallowed executable files found in module payload"
            [ -n "$EXECUTABLES" ] && echo "$EXECUTABLES"
            [ -n "$ROGUE_SCRIPTS" ] && echo "$ROGUE_SCRIPTS"
            exit 1
          fi
          echo "✅ No disallowed executable files found"

      - name: Validate required files
        run: |
          REQUIRED=(
            "_bmad/lens-work/lifecycle.yaml"
            "_bmad/lens-work/module.yaml"
            "_bmad/lens-work/module-help.csv"
            "_bmad/lens-work/README.md"
            "_bmad/lens-work/_module-installer/installer.js"
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              MISSING=1
            else
              echo "✅ $f"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then exit 1; fi

      # ── 4. Setup Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 5+6. Prepare release repo while preserving alpha history ──────
      - name: Prepare release repo (preserve alpha history)
        run: |
          # Strategy:
          # 1) If alpha exists and is related to beta, commit directly to alpha.
          # 2) Otherwise, recreate alpha from beta.
          mkdir release-repo
          cd release-repo
          git init
          git remote add origin \
            "https://x-access-token:${{ secrets.RELEASE_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/lens.core
          if ! git fetch --prune --no-tags origin \
            +refs/heads/beta:refs/remotes/origin/beta; then
            echo "::error::Failed to fetch beta branch from lens.core
            exit 1
          fi

          # alpha is optional (first publish or manual cleanup may remove it).
          if git ls-remote --exit-code --heads origin alpha >/dev/null 2>&1; then
            if ! git fetch --prune --no-tags origin \
              +refs/heads/alpha:refs/remotes/origin/alpha; then
              echo "::error::alpha exists remotely but could not be fetched"
              exit 1
            fi
          fi

          if ! git show-ref --verify --quiet refs/remotes/origin/beta; then
            echo "::error::Failed to fetch beta branch from lens.core
            exit 1
          fi

          if git show-ref --verify --quiet refs/remotes/origin/alpha; then
            if git merge-base refs/remotes/origin/alpha refs/remotes/origin/beta >/dev/null 2>&1; then
              git checkout -B alpha refs/remotes/origin/alpha
              echo "ALPHA_UPDATE_MODE=direct" >> "$GITHUB_ENV"
              echo "✅ Using existing alpha branch (direct commit mode)"
            else
              echo "::warning::alpha and beta histories are unrelated; rebuilding alpha from beta"
              git checkout -B alpha refs/remotes/origin/beta
              echo "ALPHA_UPDATE_MODE=from_beta_reset" >> "$GITHUB_ENV"
              echo "✅ Recreated alpha from beta (history repair mode)"
            fi
          else
            git checkout -B alpha refs/remotes/origin/beta
            echo "ALPHA_UPDATE_MODE=from_beta_new" >> "$GITHUB_ENV"
            echo "✅ Alpha branch will be created from beta"
          fi

      - name: Prepare clean build workspace
        run: |
          rm -rf build-output
          mkdir -p build-output
          echo "✅ build-output prepared as non-git install workspace"

      # ── 7. Install full BMAD framework ───────────────────────────────
      - name: Fetch BMB module source (no longer in external-official-modules.yaml)
        run: |
          # bmad-builder npm package contains the BMB module source at /src/
          # The BMAD installer needs --custom-content pointing to the dir with module.yaml
          mkdir -p /tmp/bmb-src
          npm pack bmad-builder@latest --pack-destination /tmp/bmb-src 2>/dev/null
          tar xzf /tmp/bmb-src/bmad-builder-*.tgz -C /tmp/bmb-src
          BMB_SRC="/tmp/bmb-src/package/src"
          echo "BMB_SRC=$BMB_SRC" >> "$GITHUB_ENV"
          echo "✅ BMB source at $BMB_SRC (code=$(grep '^code:' $BMB_SRC/module.yaml))"

      - name: Install BMAD framework (all modules + IDEs)
        working-directory: build-output
        run: |
          npx bmad-method install \
            --directory . \
            --modules "core,bmm,cis,gds,tea" \
            --custom-content "$BMB_SRC" \
            --tools "github-copilot,cursor,claude-code" \
            --action install \
            --user-name "CrisWeber" \
            --communication-language "English" \
            --document-output-language "English" \
            --output-folder "_bmad-output" \
            --yes

          echo "✅ BMAD framework installed"

      # ── 8. Overlay lens-work custom module ───────────────────────────
      - name: Overlay lens-work custom module
        run: |
          # Copy lens-work into _bmad/ as a custom module
          mkdir -p build-output/_bmad/
          cp -r _bmad/lens-work/ build-output/_bmad/lens-work/

          # Also register in _config/custom/ (BMAD convention for custom modules)
          mkdir -p build-output/_bmad/_config/custom/lens-work/
          cp -r _bmad/lens-work/ build-output/_bmad/_config/custom/lens-work/

          echo "✅ lens-work custom module overlaid"

      # ── 9. Run lens-work installer for IDE adapters ──────────────────
      - name: Install lens-work IDE adapters
        run: |
          node -e "
            const installer = require('./build-output/_bmad/lens-work/_module-installer/installer.js');
            const path = require('path');

            installer.install({
              projectRoot: path.resolve('build-output'),
              config: {
                target_projects_path: '../TargetProjects',
                default_git_remote: 'github'
              },
              installedIDEs: ['github-copilot', 'cursor', 'claude', 'codex'],
              logger: {
                log:   (m) => console.log(m),
                warn:  (m) => console.warn('⚠️ ' + m),
                error: (m) => console.error('❌ ' + m)
              },
              updateMode: true
            }).then(ok => {
              if (!ok) process.exit(1);
              console.log('✅ lens-work IDE adapters installed');
            }).catch(err => {
              console.error(err);
              process.exit(1);
            });
          "

      # ── 10. Sync source .github agents into release payload ─────────
      - name: Sync source .github agents
        run: |
          mkdir -p build-output/.github/agents

          SRC_COUNT=0
          for src in .github/agents/*.md; do
            [ -f "$src" ] || continue
            cp "$src" "build-output/.github/agents/$(basename "$src")"
            SRC_COUNT=$((SRC_COUNT + 1))
          done

          echo "✅ Synced $SRC_COUNT source agent markdown file(s) into release payload"

      # ── 10.5 Overlay source .github skills into release payload ──────
      # The lens-work installer (step 9) already generates skill stubs in
      # build-output/.github/skills/ from the SKILLS array in installer.js.
      # This step overlays/updates them from the canonical source files in
      # .github/skills/ so that manual edits to source stubs always win.
      - name: Overlay source .github skills
        run: |
          mkdir -p build-output/.github/skills

          SRC_COUNT=0
          for skill_dir in .github/skills/*/; do
            [ -d "$skill_dir" ] || continue
            skill_name=$(basename "$skill_dir")
            mkdir -p "build-output/.github/skills/$skill_name"
            cp "$skill_dir/SKILL.md" "build-output/.github/skills/$skill_name/SKILL.md"
            SRC_COUNT=$((SRC_COUNT + 1))
          done

          echo "✅ Overlaid $SRC_COUNT source skill(s) into release payload"

      # ── 10.6 Enforce lens-work prompts only in embedded .github ──────
      - name: Keep only lens-work prompt stubs
        run: |
          if [ -d "build-output/.github/prompts" ]; then
            REMOVED=$(find build-output/.github/prompts -type f -name '*.prompt.md' ! -name 'lens-work*.prompt.md' | wc -l)
            find build-output/.github/prompts -type f -name '*.prompt.md' ! -name 'lens-work*.prompt.md' -delete
            echo "✅ Removed $REMOVED non-lens prompt stub(s) from release payload"
          else
            echo "ℹ️ No build-output/.github/prompts directory found"
          fi

      # ── 11. Post-process: .xml→.yaml + config.yaml→bmadconfig.yaml ──
      - name: Post-process XML and config file names
        run: |
          cd build-output

          echo "=== Step 1: Rename .xml files to .yaml (v6.2.0: may be a no-op) ==="
          XML_FILES=$(find . -name '*.xml' -type f -not -path './.git/*' || true)
          if [ -z "$XML_FILES" ]; then
            echo "ℹ️ No .xml files found (expected for v6.2.0+ installs)"
          else
            echo "$XML_FILES" | while IFS= read -r f; do
              target="${f%.xml}.yaml"
              if [ -f "$target" ]; then
                echo "⚠️ Skipping (target exists): $f"
              else
                mv "$f" "$target"
                echo "  $f → $target"
              fi
            done
          fi

          echo ""
          echo "=== Step 2: Update .xml references → .yaml ==="
          find . -type f -not -path './.git/*' \( \
            -name '*.md' -o -name '*.yaml' -o -name '*.yml' -o \
            -name '*.csv' -o -name '*.json' -o -name '*.txt' -o \
            -name '*.js' \
          \) -print0 | xargs -0 grep -rl '\.xml' 2>/dev/null | while IFS= read -r f; do
            sed -i 's/\.xml/.yaml/g' "$f"
            echo "  Updated: $f"
          done

          echo ""
          echo "=== Step 3: Rename config.yaml → bmadconfig.yaml ==="
          find . -name 'config.yaml' -type f -not -path './.git/*' | while IFS= read -r f; do
            dir=$(dirname "$f")
            mv "$f" "$dir/bmadconfig.yaml"
            echo "  $f → $dir/bmadconfig.yaml"
          done

          echo ""
          echo "=== Step 4: Update config.yaml references → bmadconfig.yaml ==="
          find . -type f -not -path './.git/*' \( \
            -name '*.md' -o -name '*.yaml' -o -name '*.yml' -o \
            -name '*.csv' -o -name '*.json' -o -name '*.txt' -o \
            -name '*.js' \
          \) -print0 | xargs -0 grep -rl '\bconfig\.yaml\b' 2>/dev/null | while IFS= read -r f; do
            sed -i 's/\bconfig\.yaml\b/bmadconfig.yaml/g' "$f"
            echo "  Updated: $f"
          done

          echo ""
          echo "=== Verification ==="
          XML_COUNT=$(find . -name '*.xml' -type f -not -path './.git/*' | wc -l)
          CFG_COUNT=$(find . -name 'config.yaml' -type f -not -path './.git/*' | wc -l)
          echo "Remaining .xml files: $XML_COUNT"
          echo "Remaining config.yaml files: $CFG_COUNT"
          if [ "$XML_COUNT" -gt 0 ] || [ "$CFG_COUNT" -gt 0 ]; then
            echo "::warning::Some files were not converted"
          fi
          echo "✅ Post-processing complete"

      # ── 12. Fix copilot-instructions.md project name ─────────────────
      - name: Patch copilot-instructions.md
        run: |
          INSTRUCTIONS="build-output/.github/copilot-instructions.md"
          if [ -f "$INSTRUCTIONS" ]; then
            # Fix the project name (BMAD CLI uses directory name)
            sed -i 's/- \*\*Project\*\*: build-output/- **Project**: lens.coreS"
            sed -i 's/- \*\*Output Folder\*\*: _bmad-output/- **Output Folder**: lens.core "$INSTRUCTIONS"
            echo "✅ copilot-instructions.md patched"
          fi

      # ── 13. Validate release .github payload ─────────────────────────
      - name: Validate embedded .github payload
        run: |
          REQUIRED=(
            "build-output/.github/agents/bmad-agent-lens-work-lens.agent.md"
            "build-output/.github/prompts/lens-work.onboard.prompt.md"
            "build-output/.github/prompts/lens-work.discover.prompt.md"
            "build-output/.github/lens-work-instructions.md"
          )

          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required release .github artifact: $f"
              MISSING=1
            else
              echo "✅ $f"
            fi
          done

          for src in .github/agents/*.md; do
            [ -f "$src" ] || continue
            target="build-output/.github/agents/$(basename "$src")"
            if [ ! -f "$target" ]; then
              echo "::error::Missing published agent file: $target"
              MISSING=1
            else
              echo "✅ $target"
            fi
          done

          for skill_dir in .github/skills/*/; do
            [ -d "$skill_dir" ] || continue
            skill_name=$(basename "$skill_dir")
            target="build-output/.github/skills/$skill_name/SKILL.md"
            if [ ! -f "$target" ]; then
              echo "::error::Missing published skill file: $target"
              MISSING=1
            else
              echo "✅ $target"
            fi
          done

          if [ -e "build-output/.github/.git" ]; then
            echo "::error::build-output/.github contains .git; .github must be embedded content, not a nested clone"
            MISSING=1
          fi

          if [ -d "build-output/.github/prompts" ]; then
            NON_LENS=$(find build-output/.github/prompts -type f -name '*.prompt.md' ! -name 'lens-work*.prompt.md' | wc -l)
            if [ "$NON_LENS" -gt 0 ]; then
              echo "::error::.github/prompts must only contain lens-work*.prompt.md files"
              find build-output/.github/prompts -type f -name '*.prompt.md' ! -name 'lens-work*.prompt.md'
              MISSING=1
            fi
          fi

          if [ "$MISSING" -eq 1 ]; then
            exit 1
          fi

      # ── 14. Add manifest entry for lens-work ─────────────────────────
      - name: Update BMAD manifest with lens-work
        run: |
          MANIFEST="build-output/_bmad/_config/manifest.yaml"
          if [ -f "$MANIFEST" ]; then
            if ! grep -q "name: lens-work" "$MANIFEST"; then
              VERSION="${{ steps.version.outputs.version }}"
              NOW="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
              printf '\n  - name: lens-work\n    version: "%s"\n    installDate: "%s"\n    lastUpdated: "%s"\n    source: custom\n    npmPackage: null\n    repoUrl: null\n' \
                "$VERSION" "$NOW" "$NOW" >> "$MANIFEST"
              echo "lens-work added to manifest"
            else
              echo "lens-work already in manifest"
            fi
          fi

      # ── 15. Commit & push to alpha ───────────────────────────────────
      - name: Commit and push to alpha
        working-directory: release-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rsync -a --delete --exclude '.git' ../build-output/ ./

          git add -A

          if git diff --cached --quiet; then
            case "${ALPHA_UPDATE_MODE:-direct}" in
              from_beta_reset)
                git push --force-with-lease origin alpha
                echo "✅ Repaired alpha from beta (no payload delta)"
                ;;
              from_beta_new)
                git push --set-upstream origin alpha
                echo "✅ Created alpha from beta (no payload delta)"
                ;;
              *)
                echo "No changes to promote — skipping"
                ;;
            esac
            echo "has_changes=false" >> "$GITHUB_ENV"
          else
            git commit -m "[PROMOTE] Full BMAD + lens-work v${{ steps.version.outputs.version }}"
            case "${ALPHA_UPDATE_MODE:-direct}" in
              from_beta_reset)
                # Force only when replacing a broken, unrelated alpha history.
                git push --force-with-lease origin alpha
                echo "✅ Reset alpha from beta and pushed payload"
                ;;
              from_beta_new)
                git push --set-upstream origin alpha
                echo "✅ Created alpha from beta and pushed payload"
                ;;
              *)
                git push origin alpha
                echo "✅ Committed directly to alpha"
                ;;
            esac

            echo "has_changes=true" >> "$GITHUB_ENV"
          fi

      # ── 16. Create PR alpha → beta ──────────────────────────────────
      - name: Verify alpha and beta ancestry
        working-directory: release-repo
        run: |
          git fetch --no-tags origin \
            +refs/heads/alpha:refs/remotes/origin/alpha \
            +refs/heads/beta:refs/remotes/origin/beta

          if git merge-base refs/remotes/origin/alpha refs/remotes/origin/beta >/dev/null 2>&1; then
            echo "✅ Verified: alpha and beta share ancestry"
          else
            echo "::error::alpha and beta are unrelated after promotion push"
            echo "::error::This run is blocked to prevent creating an invalid PR state"
            exit 1
          fi

      - name: Create PR alpha → beta
        if: env.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
        run: |
          OPEN_PRS=$(curl -s \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository_owner }}/lens.coregithub.repository_owner }}:alpha&base=beta&state=open")
          PR_COUNT=$(echo "$OPEN_PRS" | jq 'length')

          if [ "$PR_COUNT" -gt 0 ]; then
            PR_URL=$(echo "$OPEN_PRS" | jq -r '.[0].html_url')
            echo "::notice::PR already exists: $PR_URL"
          else
            PR_RESPONSE=$(curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository_owner }}/lens.core
              -d "$(jq -n \
                --arg title "[PROMOTE] Full BMAD + lens-work v${{ steps.version.outputs.version }}" \
                --arg body "Full BMAD framework + lens-work custom module build.\n\n**lens-work version:** ${{ steps.version.outputs.version }}\n**Source commit:** ${{ github.sha }}\n**Triggered by:** ${{ github.actor }}\n\n**Included:**\n- BMAD core + bmm + bmb + cis + gds + tea\n- lens-work custom module\n- IDE adapters: GitHub Copilot, Cursor, Claude, Codex\n- Embedded .github payload (agents/prompts/instructions) with lens-work prompts only" \
                --arg head "alpha" \
                --arg base "beta" \
                '{title: $title, body: $body, head: $head, base: $base}')")

            PR_URL=$(echo "$PR_RESPONSE" | jq -r '.html_url // empty')

            if [ -n "$PR_URL" ]; then
              echo "✅ PR created: $PR_URL"
            else
              echo "::error::Failed to create PR"
              echo "$PR_RESPONSE" | jq .
              exit 1
            fi
          fi