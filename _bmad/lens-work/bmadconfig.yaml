# LENS Workbench Configuration
# Source template for BMAD agent activation and workflow defaults
# Version: 2.0.0

# GitHub account username — set to your GitHub username (run: gh auth status)
# This is the single source of truth; all module configs resolve user_name from here.
github_username: your-github-username

project_name: bmad.lens.bmad
user_skill_level: intermediate
planning_artifacts: "{project-root}/_bmad-output/planning-artifacts"
implementation_artifacts: "{project-root}/_bmad-output/implementation-artifacts"
project_knowledge: "{project-root}/docs"

# Lens-work module defaults
release_repo_root: lens.core
target_projects_path: "../TargetProjects"
default_git_remote: github
lifecycle_contract: "{project-root}/_bmad/lens-work/lifecycle.yaml"
initiative_output_folder: "{project-root}/_bmad-output/lens-work/initiatives"
personal_output_folder: "{project-root}/_bmad-output/lens-work/personal"

# Default model for prompt files — change this to update all prompts at once
default_model: "Claude Sonnet 4.6 (copilot)"

# Governance — resolved by /onboard, used during activation health checks
governance_repo_path: "{project-root}"
target_repos: []

# Core Configuration Values
user_name: "${github_username}"
communication_language: English
document_output_language: English
output_folder: "{project-root}/_bmad-output"