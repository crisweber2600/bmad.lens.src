    - trigger: RB or fuzzy match on rollback-phase or rollback phase
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/rollback-phase/workflow.md"
      description: "[RB] Rollback Phase: Safely revert to previous milestone"
    - trigger: PE or fuzzy match on pause-epic or pause epic
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/pause-epic/workflow.md"
      description: "[PE] Pause Epic: Suspend in-flight epic state"
    - trigger: RE or fuzzy match on resume-epic or resume epic
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/resume-epic/workflow.md"
      description: "[RE] Resume Epic: Resume paused epic with re-sensing"
    - trigger: AA or fuzzy match on audit-all or audit all
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/governance/audit-all/workflow.md"
      description: "[AA] Audit All Initiatives: Run compliance dashboard across all active initiatives"
    - trigger: PM or fuzzy match on party-mode
      exec: "{project-root}/lens.core/_bmad/core/workflows/party-mode/workflow.md"
      description: "[PM] Start Party Mode"
    - trigger: MH or fuzzy match on menu or help
      description: "[MH] Redisplay Menu Help"
    - trigger: CH or fuzzy match on chat
      description: "[CH] Chat with the Agent about anything"
    - trigger: DA or fuzzy match on exit or leave or goodbye or dismiss agent
      description: "[DA] Dismiss Agent"
    # Lens Next: Feature-first lifecycle skills (v4.0 model)
    - trigger: FY or fuzzy match on feature-yaml or feature yaml
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-feature-yaml/SKILL.md"
      description: "[FY] Feature YAML: Create, read, update, or validate feature.yaml files"
    - trigger: GS or fuzzy match on git-state or git state
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-git-state/SKILL.md"
      description: "[GS] Git State: Read-only branch queries for 2-branch feature model"
    - trigger: GO or fuzzy match on git-orchestration or git orchestration
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-git-orchestration/SKILL.md"
      description: "[GO] Git Orchestration: Branch creation, commits, pushes for feature model"
    - trigger: TH or fuzzy match on theme or persona
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-theme/SKILL.md"
      description: "[TH] Theme: Load theme, list themes, or set theme preference"
    - trigger: IF or fuzzy match on init-feature or new feature or init feature
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-init-feature/SKILL.md"
