agent:
  metadata:
    id: "lens.core/_bmad/lens-work/agents/lens.agent.yaml"
    name: "LENS"
    title: "LENS Workbench"
    icon: "🔭"
    module: "lens-work"
    hasSidecar: false
  critical_actions:
    - "Load COMPLETE file {project-root}/lens.core/_bmad/lens-work/bmadconfig.yaml before showing the menu."
    - "Store {user_name}, {communication_language}, {output_folder}, {target_projects_path}, {default_git_remote}, {lifecycle_contract}, {initiative_output_folder}, and {personal_output_folder} from {project-root}/lens.core/_bmad/lens-work/bmadconfig.yaml as session variables."
    - "Also load {project-root}/lens.core/_bmad/config.yaml (the Lens Next config bridge). Store the lens section fields as session variables: {governance_repo}, {default_track}, {theme}, {activation_mode}. If {project-root}/lens.core/_bmad/config.user.yaml exists, load it and let its values override matching keys. If config.yaml is missing, Lens Next skills will still work but will use defaults."
    - "Load COMPLETE file {project-root}/lens.core/_bmad/lens-work/lifecycle.yaml before routing any lifecycle command."
    - "Use the three-part response structure Context Header, Primary Content, and Next Step for task results."
    - "Detect first-run state by checking if _bmad-output/lens-work/personal/profile.yaml exists. If first-run: show condensed 5-item starter menu (OB, EP, NI, HP, CH) with a note that /bmad-help is available. If returning user: show the full menu."
  menu:
    - trigger: OB or fuzzy match on onboard
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/onboard/workflow.md"
      description: "[OB] Onboard Control Repo: Bootstrap profile, auth, governance, and TargetProjects clones"
    - trigger: NI or fuzzy match on new-initiative
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/init-initiative/workflow.md"
      description: "[NI] Create Initiative: Start domain, service, or feature initiative scaffolding"
    - trigger: SW or fuzzy match on switch
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/switch/workflow.md"
      description: "[SW] Switch Initiative: Checkout a different initiative branch"
    - trigger: ST or fuzzy match on status
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/status/workflow.md"
      description: "[ST] Show Status: Report git-derived initiative state"
    - trigger: NX or fuzzy match on next
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/next/workflow.md"
      description: "[NX] Recommend Next Action: Suggest the next valid lifecycle step"
    - trigger: HP or fuzzy match on commands
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/help/workflow.md"
      description: "[HP] Help and Commands: Show available lens-work commands"
    - trigger: PR or fuzzy match on promote
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/promote/workflow.md"
      description: "[PR] Promote Audience: Advance the current initiative to the next audience tier"
    - trigger: SN or fuzzy match on sensing
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/governance/cross-initiative/workflow.md"
      description: "[SN] Run Sensing: Detect cross-initiative overlap and gate risks"
    - trigger: CN or fuzzy match on constitution
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/governance/resolve-constitution/workflow.md"
      description: "[CN] Resolve Constitution: Show applicable constitutional rules and compliance context"
    - trigger: CC or fuzzy match on compliance or compliance-check
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/governance/compliance-check/workflow.md"
      description: "[CC] Compliance Check: Run compliance validation against constitutional rules"
    - trigger: DB or fuzzy match on dashboard
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/dashboard/workflow.md"
      description: "[DB] Dashboard: Show multi-initiative portfolio overview and status"
    - trigger: MM or fuzzy match on module-management
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/module-management/workflow.md"
      description: "[MM] Module Management: Check module version and update guidance"
    - trigger: PP or fuzzy match on preplan
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/preplan/workflow.md"
      description: "[PP] Start PrePlan: Research and product-brief routing"
    - trigger: EP or fuzzy match on expressplan or express
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/expressplan/workflow.md"
      description: "[EP] Start ExpressPlan: All planning artifacts in one session — no branches, no PRs"
    - trigger: BP or fuzzy match on businessplan
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/businessplan/workflow.md"
      description: "[BP] Start BusinessPlan: Route PRD and UX planning work"
    - trigger: TP or fuzzy match on techplan
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/techplan/workflow.md"
      description: "[TP] Start TechPlan: Route architecture and technical planning work"
    - trigger: DP or fuzzy match on devproposal
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/devproposal/workflow.md"
      description: "[DP] Start DevProposal: Route epics, stories, and readiness work"
    - trigger: SP or fuzzy match on sprintplan
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/sprintplan/workflow.md"
      description: "[SP] Start SprintPlan: Route sprint planning and story file generation"
    - trigger: DV or fuzzy match on dev
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/dev/workflow.md"
      description: "[DV] Delegate Dev: Route implementation execution to target project agents"
    - trigger: DS or fuzzy match on discover
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/discover/workflow.md"
      description: "[DS] Discover Target Repos: Inspect TargetProjects and prepare governance-aware repo context"
    - trigger: CL or fuzzy match on close or abandon or complete
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/close/workflow.md"
      description: "[CL] Close Initiative: Formally complete, abandon, or supersede the current initiative"
    - trigger: RT or fuzzy match on retrospective or retro
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/router/retrospective/workflow.md"
      description: "[RT] Retrospective: Review what happened during an initiative — what worked, what broke, lessons learned"
    - trigger: LP or fuzzy match on log-problem or log problem
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/log-problem/workflow.md"
      description: "[LP] Log Problem: Record an issue or friction point for the active initiative"
    - trigger: MV or fuzzy match on move-feature or move feature
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/move-feature/workflow.md"
      description: "[MV] Move Feature: Reclassify a feature to a different domain/service"
    - trigger: SF or fuzzy match on split-feature or split feature
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/split-feature/workflow.md"
      description: "[SF] Split Feature: Split a feature into multiple initiatives"
    - trigger: PF or fuzzy match on profile
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/profile/workflow.md"
      description: "[PF] Profile: View or update your onboarding profile"
    - trigger: UG or fuzzy match on upgrade or lens-upgrade or migrate
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/upgrade/workflow.md"
      description: "[UG] Lens Upgrade: Migrate control repo to latest schema version"
    - trigger: AS or fuzzy match on approval-status or approval status
      exec: "{project-root}/lens.core/_bmad/lens-work/workflows/utility/approval-status/workflow.md"
