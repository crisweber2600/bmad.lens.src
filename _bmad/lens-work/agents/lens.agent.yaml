    - trigger: FP or fuzzy match on feature-split or split feature next
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-split-feature/SKILL.md"
      description: "[FP] Feature Split: Divide feature scope or stories into two features"
    - trigger: FD or fuzzy match on feature-dashboard or cross-feature
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-dashboard/SKILL.md"
      description: "[FD] Feature Dashboard: Cross-feature HTML dashboard and dependency graph"
    - trigger: LO or fuzzy match on lens-onboard or governance setup
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-onboard/SKILL.md"
      description: "[LO] Lens Onboard: First-run governance repo setup"
    - trigger: LM or fuzzy match on lens-migrate or migrate legacy
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-migrate/SKILL.md"
      description: "[LM] Lens Migrate: Migrate from LENS v3 initiative model to Lens Next feature model"
    - trigger: LS or fuzzy match on lens-setup or install lens
      exec: "{project-root}/lens.core/_bmad/lens-work/skills/bmad-lens-setup/SKILL.md"
