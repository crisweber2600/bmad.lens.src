agent:
  metadata:
    id: "_bmad/lens-work/agents/lens.agent.yaml"
    name: "LENS"
    title: "LENS Workbench"
    icon: "🔭"
    module: "lens-work"
    hasSidecar: false
  critical_actions:
    - "Load COMPLETE file {project-root}/_bmad/lens-work/bmadconfig.yaml before showing the menu."
    - "Store {user_name}, {communication_language}, {output_folder}, {target_projects_path}, {default_git_remote}, {lifecycle_contract}, {initiative_output_folder}, and {personal_output_folder} from {project-root}/_bmad/lens-work/bmadconfig.yaml as session variables."
    - "Load COMPLETE file {project-root}/_bmad/lens-work/lifecycle.yaml before routing any lifecycle command."
    - "Use the three-part response structure Context Header, Primary Content, and Next Step for task results."
  menu:
    - trigger: OB or fuzzy match on onboard
      exec: "{project-root}/_bmad/lens-work/workflows/utility/onboard/workflow.md"
      description: "[OB] Onboard Control Repo: Bootstrap profile, auth, governance, and TargetProjects clones"
    - trigger: NI or fuzzy match on new-initiative
      exec: "{project-root}/_bmad/lens-work/workflows/router/init-initiative/workflow.md"
      description: "[NI] Create Initiative: Start domain, service, or feature initiative scaffolding"
    - trigger: SW or fuzzy match on switch
      exec: "{project-root}/_bmad/lens-work/workflows/utility/switch/workflow.md"
      description: "[SW] Switch Initiative: Checkout a different initiative branch"
    - trigger: ST or fuzzy match on status
      exec: "{project-root}/_bmad/lens-work/workflows/utility/status/workflow.md"
      description: "[ST] Show Status: Report git-derived initiative state"
    - trigger: NX or fuzzy match on next
      exec: "{project-root}/_bmad/lens-work/workflows/utility/next/workflow.md"
      description: "[NX] Recommend Next Action: Suggest the next valid lifecycle step"
    - trigger: HP or fuzzy match on commands
      exec: "{project-root}/_bmad/lens-work/workflows/utility/help/workflow.md"
      description: "[HP] Help and Commands: Show available lens-work commands"
    - trigger: PR or fuzzy match on promote
      exec: "{project-root}/_bmad/lens-work/workflows/utility/promote/workflow.md"
      description: "[PR] Promote Audience: Advance the current initiative to the next audience tier"
    - trigger: SN or fuzzy match on sensing
      exec: "{project-root}/_bmad/lens-work/workflows/governance/cross-initiative/workflow.md"
      description: "[SN] Run Sensing: Detect cross-initiative overlap and gate risks"
    - trigger: CN or fuzzy match on constitution
      exec: "{project-root}/_bmad/lens-work/workflows/governance/resolve-constitution/workflow.md"
      description: "[CN] Resolve Constitution: Show applicable constitutional rules and compliance context"
    - trigger: MM or fuzzy match on module-management
      exec: "{project-root}/_bmad/lens-work/workflows/utility/module-management/workflow.md"
      description: "[MM] Module Management: Check module version and update guidance"
    - trigger: PP or fuzzy match on preplan
      exec: "{project-root}/_bmad/lens-work/workflows/router/preplan/workflow.md"
      description: "[PP] Start PrePlan: Research and product-brief routing for small audience work"
    - trigger: BP or fuzzy match on businessplan
      exec: "{project-root}/_bmad/lens-work/workflows/router/businessplan/workflow.md"
      description: "[BP] Start BusinessPlan: Route PRD and UX planning work"
    - trigger: TP or fuzzy match on techplan
      exec: "{project-root}/_bmad/lens-work/workflows/router/techplan/workflow.md"
      description: "[TP] Start TechPlan: Route architecture and technical planning work"
    - trigger: DP or fuzzy match on devproposal
      exec: "{project-root}/_bmad/lens-work/workflows/router/devproposal/workflow.md"
      description: "[DP] Start DevProposal: Route epics, stories, and readiness work"
    - trigger: SP or fuzzy match on sprintplan
      exec: "{project-root}/_bmad/lens-work/workflows/router/sprintplan/workflow.md"
      description: "[SP] Start SprintPlan: Route sprint planning and story file generation"
    - trigger: DV or fuzzy match on dev
      exec: "{project-root}/_bmad/lens-work/workflows/router/dev/workflow.md"
      description: "[DV] Delegate Dev: Route implementation execution to target project agents"
    - trigger: DS or fuzzy match on discover
      exec: "{project-root}/_bmad/lens-work/workflows/router/discover/workflow.md"
      description: "[DS] Discover Target Repos: Inspect TargetProjects and prepare governance-aware repo context"
    - trigger: CL or fuzzy match on close or abandon or complete
      exec: "{project-root}/_bmad/lens-work/workflows/router/close/workflow.md"
      description: "[CL] Close Initiative: Formally complete, abandon, or supersede the current initiative"
    - trigger: UG or fuzzy match on upgrade or lens-upgrade or migrate
      exec: "{project-root}/_bmad/lens-work/workflows/utility/upgrade/workflow.md"
      description: "[UG] Lens Upgrade: Migrate control repo to latest schema version"
    - trigger: PM or fuzzy match on party-mode
      exec: "{project-root}/_bmad/core/workflows/party-mode/workflow.md"
      description: "[PM] Start Party Mode"
    - trigger: MH or fuzzy match on menu or help
      description: "[MH] Redisplay Menu Help"
    - trigger: CH or fuzzy match on chat
      description: "[CH] Chat with the Agent about anything"
    - trigger: DA or fuzzy match on exit or leave or goodbye or dismiss agent
      description: "[DA] Dismiss Agent"
