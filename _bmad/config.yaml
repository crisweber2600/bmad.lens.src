# BMAD Config Bridge
# Maps the Lens Next config schema to this project's structure.
# New Lens skills (bmad-lens-*) reference this file at {project-root}/_bmad/config.yaml
# This file bootstraps by loading the authoritative lens-work bmadconfig.yaml values.

# --- Core BMAD defaults ---
user_name: "${github_username}"
communication_language: English
document_output_language: English
output_folder: "{project-root}/_bmad-output"

# --- Lens section (consumed by bmad-lens-* skills) ---
lens:
  governance_repo: "{project-root}"
  username: "${github_username}"
  default_track: "full"
  theme: "default"
  activation_mode: "auto"
  target_repos: []

  # Path mappings for old-release compatibility
  module_path: "_bmad/lens-work"
  skills_path: "_bmad/lens-work/skills"
  prompts_path: "_bmad/lens-work/prompts"
  lifecycle_contract: "{project-root}/_bmad/lens-work/lifecycle.yaml"
  output_folder: "{project-root}/_bmad-output/lens-work"

# --- Reference: Authoritative config ---
# The canonical bmadconfig.yaml for this project lives at:
#   _bmad/lens-work/bmadconfig.yaml
# If they diverge, lens-work/bmadconfig.yaml takes precedence for legacy workflows.
